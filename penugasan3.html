<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Penugasan 3 — JavaScript Interaktif" />
    <title>Penugasan 3 — Nadhief</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- Navbar -->
    <nav id="navbar" class="navbar scrolled">
        <div class="container navbar__inner">
            <a href="index.html" class="navbar__logo">
                <span class="navbar__logo-icon">&lt;/&gt;</span>
                <span class="navbar__logo-text">Nadhief</span>
            </a>
            <ul class="navbar__menu">
                <li class="navbar__menu-item"><a href="index.html#beranda">Beranda</a></li>
                <li class="navbar__menu-item"><a href="index.html#penugasan">Penugasan</a></li>
            </ul>
        </div>
    </nav>


    <main class="assignment-detail">
        <div class="container">
            <div class="assignment-detail__header reveal-up">
                <div class="assignment-detail__icon"><i class="fab fa-js-square"></i></div>
                <div class="assignment-detail__number">Tugas 3</div>
                <h1 class="assignment-detail__title">Penugasan 3 — Infografis</h1>
            </div>


            <!-- File Tugas - Infografis -->
            <div class="assignment-detail__card assignment-detail__file-card reveal-up">
                <h3><i class="fas fa-image"></i> Infografis</h3>
                <div class="pdf-viewer">
                    <iframe src="Biru Ilustrasi Pendidikan Digital Infografis.pdf" class="pdf-viewer__frame"
                        title="Biru Ilustrasi Pendidikan Digital Infografis">
                    </iframe>
                    <p class="pdf-viewer__fallback">
                        Jika file tidak tampil,
                        <a href="Biru Ilustrasi Pendidikan Digital Infografis.pdf" target="_blank">
                            klik di sini untuk membuka file
                        </a>.
                    </p>
                </div>
            </div>


            <!-- Tombol kembali -->
            <div style="text-align: center;">
                <a href="index.html#penugasan" class="assignment-detail__back reveal-up">
                    <i class="fas fa-arrow-left"></i> Kembali ke Penugasan
                </a>
            </div>
        </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container footer__inner">
            <p class="footer__copyright">© 2026 Nadhief. All rights reserved.</p>
            <p class="footer__tagline">Dibuat dengan ❤️ dan ☕</p>
        </div>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const reveals = document.querySelectorAll(".reveal-up, .reveal-left, .reveal-right, .reveal-scale");
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) entry.target.classList.add("visible");
                });
            }, { threshold: 0.1 });
            reveals.forEach(el => observer.observe(el));
        });
    </script>
</body>


</html>
